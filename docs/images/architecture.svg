  <rect x="540" y="90" width="190" height="90" class="box" fill="#dbeafe" />
  <text x="565" y="125" class="label">Silver Delta</text>
  <text x="565" y="155" class="small">Validated, deduped, masked entities</text>

  <rect x="540" y="220" width="190" height="90" class="box" fill="#e0f2fe" />
  <text x="565" y="255" class="label">LLM Enrichment</text>
  <text x="565" y="285" class="small">Mock or external text classifier</text>

  <rect x="785" y="90" width="165" height="110" class="box" fill="#dcfce7" />
  <text x="808" y="125" class="label">Gold Marts</text>
  <text x="808" y="155" class="small">activation</text>
  <text x="808" y="180" class="small">retention</text>
  <text x="808" y="205" class="small">experiments</text>

  <rect x="785" y="240" width="165" height="90" class="box" fill="#ecfccb" />
  <text x="812" y="275" class="label">Ops Tables</text>
  <text x="812" y="305" class="small">audit + quality results</text>

  <path d="M240 145 L295 135" class="arrow" />
  <path d="M390 180 L390 220" class="arrow" />
  <path d="M485 135 L540 135" class="arrow" />
  <path d="M635 180 L635 220" class="arrow" />
  <path d="M730 135 L785 145" class="arrow" />
  <path d="M730 265 L785 285" class="arrow" />
</svg>
